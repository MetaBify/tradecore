<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <title>Tradecore | Contact</title>
  </head>
  <body data-page="contact" class="force-motion">
    <div class="page-texture" aria-hidden="true"></div>
    <header class="floating-nav" data-reveal data-delay="40">
      <a class="brand" href="/" data-transition>Tradecore</a>
      <button
        class="nav-toggle"
        type="button"
        aria-label="Toggle menu"
        aria-expanded="false"
        aria-controls="primary-nav"
      >
        <span></span>
        <span></span>
        <span></span>
      </button>
      <nav id="primary-nav" class="nav-links">
        <a href="/" data-nav="home" data-transition>Home</a>
        <a href="/contact.html" data-nav="contact" data-transition>Contact</a>
      </nav>
    </header>

    <main class="contact-layout">
      <section class="contact-panel lift-up lift-up-a">
        <p class="eyebrow">Contact</p>
        <h1>Let&apos;s Build Something Clean And Bold.</h1>
        <p>
          Keep this page simple: direct email, a short form, and clear response
          expectations.
        </p>
        <div class="contact-links">
          <a href="mailto:hello@tradecore.com">hello@tradecore.com</a>
          <a href="tel:+15555551234">+1 (555) 555-1234</a>
          <a href="#">Instagram / X / LinkedIn</a>
        </div>
      </section>
      <section class="form-panel lift-up lift-up-b">
        <form>
          <label>
            Name
            <input type="text" placeholder="Your name" />
          </label>
          <label>
            Email
            <input type="email" placeholder="you@company.com" />
          </label>
          <label>
            Project Brief
            <textarea rows="4" placeholder="Tell us what you need"></textarea>
          </label>
          <button class="btn btn-primary btn-live" type="submit">Send Inquiry</button>
        </form>
      </section>
    </main>

    <script type="module" src="/src/contact.js"></script>
  </body>
</html>
